<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 640" width="320" height="640" role="img" aria-hidden="true" focusable="false">
  <title>Truvis inspection app phone mockup</title>
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef7f7"/>
      <stop offset="1" stop-color="#fffdf9"/>
    </linearGradient>
  </defs>
  <!-- Phone frame -->
  <rect x="10" y="10" width="300" height="620" rx="42" ry="42" fill="#2e4057"/>
  <rect x="20" y="20" width="280" height="600" rx="34" ry="34" fill="url(#screen)"/>
  <!-- Notch -->
  <rect x="130" y="30" width="60" height="14" rx="7" ry="7" fill="#2e4057"/>
  <!-- Status bar / eyebrow -->
  <text x="40" y="78" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="700" fill="#3d7a8a" letter-spacing="2">TRUVIS INSPECTION</text>
  <line x1="40" y1="86" x2="280" y2="86" stroke="#3d7a8a" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Scan in progress header -->
  <text x="40" y="116" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="16" font-weight="700" fill="#2e4057">Scan in progress</text>
  <text x="40" y="136" font-family="Inter, sans-serif" font-size="11" fill="#5f6f7e">2012 VW Golf · step 4 of 12</text>
  <!-- Progress bar -->
  <rect x="40" y="148" width="240" height="6" rx="3" ry="3" fill="#eef7f7"/>
  <rect x="40" y="148" width="96" height="6" rx="3" ry="3" fill="#3d7a8a"/>
  <!-- Card 1: engine -->
  <rect x="30" y="178" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="rgba(46,64,87,0.12)"/>
  <circle cx="54" cy="209" r="10" fill="#22c55e"/>
  <text x="72" y="204" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#2e4057">Engine bay</text>
  <text x="72" y="222" font-family="Inter, sans-serif" font-size="11" fill="#5f6f7e">No leaks · belts OK</text>
  <!-- Card 2: tires (warning) -->
  <rect x="30" y="250" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="rgba(46,64,87,0.12)"/>
  <circle cx="54" cy="281" r="10" fill="#f59e0b"/>
  <text x="72" y="276" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#2e4057">Tires</text>
  <text x="72" y="294" font-family="Inter, sans-serif" font-size="11" fill="#5f6f7e">Front pair worn · negotiate €180</text>
  <!-- Card 3: underbody (critical) -->
  <rect x="30" y="322" width="260" height="62" rx="12" ry="12" fill="#ffffff" stroke="rgba(46,64,87,0.12)"/>
  <circle cx="54" cy="353" r="10" fill="#ef4444"/>
  <text x="72" y="348" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="13" font-weight="700" fill="#2e4057">Underbody</text>
  <text x="72" y="366" font-family="Inter, sans-serif" font-size="11" fill="#5f6f7e">Rust on subframe · walk away</text>
  <!-- Severity summary -->
  <rect x="30" y="406" width="260" height="110" rx="14" ry="14" fill="#2e4057"/>
  <text x="46" y="432" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="11" font-weight="700" fill="#f5a623" letter-spacing="2">SUMMARY</text>
  <text x="46" y="460" font-family="Plus Jakarta Sans, Inter, sans-serif" font-size="20" font-weight="800" fill="#ffffff">Negotiate €900</text>
  <text x="46" y="480" font-family="Inter, sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.8">or walk away — 1 critical flag</text>
  <!-- CTA button -->
  <rect x="46" y="492" width="100" height="14" rx="7" ry="7" fill="#3d7a8a"/>
  <rect x="154" y="492" width="90" height="14" rx="7" ry="7" fill="#ffffff" fill-opacity="0.15"/>
  <!-- Footer nav dots -->
  <circle cx="140" cy="548" r="4" fill="#3d7a8a"/>
  <circle cx="160" cy="548" r="4" fill="rgba(46,64,87,0.25)"/>
  <circle cx="180" cy="548" r="4" fill="rgba(46,64,87,0.25)"/>
  <!-- Home indicator -->
  <rect x="130" y="598" width="60" height="4" rx="2" ry="2" fill="#2e4057"/>
</svg>
